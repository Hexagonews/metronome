<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Metronome</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root[data-theme="dark"] {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent-color: #00fff0;
            --accent-stop: #ff007f;
            --text-color: #ffffff;
            --text-muted: #8a8a93;
            --control-bg: #2a2a30;
            --control-active: #3a3a42;
            --shadow: rgba(0, 0, 0, 0.4);
            --border: rgba(255, 255, 255, 0.05);
        }

        :root[data-theme="light"] {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --accent-color: #0080ff;
            --accent-stop: #e6005c;
            --text-color: #1c1c1e;
            --text-muted: #68686e;
            --control-bg: #eaeaea;
            --control-active: #dddddd;
            --shadow: rgba(0, 0, 0, 0.08);
            --border: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .top-bar {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
        }

        .theme-toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.2s ease;
        }

        .container {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 32px var(--shadow);
            text-align: center;
            width: 320px;
            border: 1px solid var(--border);
            box-sizing: border-box;
            transition: background-color 0.3s ease, border 0.3s ease, box-shadow 0.3s ease;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            letter-spacing: -0.5px;
            font-size: 24px;
            color: var(--text-color);
        }

        .visualizer-outer {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, var(--accent-color) 0%, rgba(0,0,0,0) 70%);
            opacity: 0.8;
            transition: all 0.1s ease;
        }

        #visual-beat {
            font-size: 64px;
            font-weight: 700;
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-color);
            transition: transform 0.05s ease;
        }

        .pulse {
            transform: scale(1.15);
        }

        .control-group {
            margin: 25px 0;
            text-align: left;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .bpm-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--control-bg);
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        #bpm-val {
            background: transparent;
            border: none;
            color: var(--accent-color);
            font-weight: 600;
            font-size: 14px;
            width: 35px;
            text-align: right;
            font-family: inherit;
            outline: none;
            padding: 0;
            margin-right: 2px;
        }

        #bpm-val::-webkit-outer-spin-button,
        #bpm-val::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #bpm-val {
            -moz-appearance: textfield;
        }

        .bpm-suffix {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: var(--control-bg);
            border-radius: 4px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-color);
            transition: transform 0.1s;
        }

        .time-picker {
            display: flex;
            background: var(--control-bg);
            padding: 4px;
            border-radius: 14px;
            gap: 4px;
        }

        .time-btn {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 12px 0;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .time-btn.active {
            background: var(--control-active);
            color: var(--accent-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        #start-btn {
            background: linear-gradient(135deg, var(--accent-color) 0%, #00bfff 100%);
            color: #000;
            font-weight: 600;
            border: none;
            padding: 18px;
            font-size: 18px;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 20px var(--accent-color);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        :root[data-theme="light"] #start-btn {
            color: #fff;
        }

        #start-btn:active {
            transform: scale(0.98);
        }

        #start-btn.playing {
            background: linear-gradient(135deg, var(--accent-stop) 0%, #bc00dd 100%);
            color: #fff;
            box-shadow: 0 4px 20px var(--accent-stop);
        }

        #start-btn:disabled {
            background: var(--control-bg);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            body {
                justify-content: flex-start;
                padding-top: 60px;
            }
            .container {
                width: 100%;
                height: calc(100vh - 60px);
                border-radius: 30px 30px 0 0;
                border-bottom: none;
                border-left: none;
                border-right: none;
                padding: 30px 20px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
            .visualizer-outer {
                margin: 10px auto;
            }
            #start-btn {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="theme-toggle-btn" id="theme-toggle">☀️ Light Mode</button>
</div>

<div class="container">
    <h2>Voice Metronome</h2>
    
    <div class="visualizer-outer" id="visualizer-box">
        <div id="visual-beat">1</div>
    </div>

    <div>
        <div class="control-group">
            <label for="bpm">
                Tempo 
                <div class="bpm-input-wrapper">
                    <input type="number" id="bpm-val" min="40" max="218" value="120"> 
                    <span class="bpm-suffix">BPM</span>
                </div>
            </label>
            <input type="range" id="bpm" min="40" max="218" value="120">
        </div>

        <div class="control-group">
            <label>Time Signature</label>
            <div class="time-picker">
                <button class="time-btn" data-value="2">2/4</button>
                <button class="time-btn" data-value="3">3/4</button>
                <button class="time-btn active" data-value="4">4/4</button>
            </div>
        </div>
    </div>

    <button id="start-btn">Start</button>
</div>

<script src="app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log("SW failed", err));
    }
</script>
</body>
</html>
